# -----------------------------------------------------------------------------------------
# Macro để xác định container isolator (dùng contains để tránh lỗi do Docker Compose prefix)
# -----------------------------------------------------------------------------------------
- macro: is_ginnungagap_sandbox
  condition: >
    (container.name contains "sandbox" or 
     container.name contains "ginnungagap-isolator" or
     container.image.repository contains "ginnungagap-isolator")

- rule: Detect Fake Credentials Read
  desc: Detect when the npm isolator attempts to read the honeypot credentials
  condition: >
    evt.type in (open, openat, openat2) and 
    (fd.name contains /.aws/ or 
     fd.name contains /.kube/ or
     fd.name contains /.ssh/) and
    is_ginnungagap_sandbox and
    not (proc.name in (generate_creden, ssh-keygen))
  output: "Malicious read attempt on honeypot credentials (user=%user.name command=%proc.cmdline file=%fd.name container_id=%container.id image=%container.image.repository)"
  priority: CRITICAL
  tags: [isolator, honeypot, supply_chain]

- rule: Detect Network Connections from npm
  desc: Detect when npm or node attempts to make outbound connections not related to package registry
  condition: >
    evt.type in (connect) and 
    fd.typechar = 4 and 
    fd.l4proto in (tcp, udp) and
    (proc.name in (sh, bash, curl, wget)) and
    is_ginnungagap_sandbox
  output: "Outbound network connection detected from isolator (user=%user.name command=%proc.cmdline connection=%fd.name container_id=%container.id image=%container.image.repository)"
  priority: WARNING
  tags: [isolator, network, exfiltration]

- rule: Detect Sensitive Env Var Read
  desc: Detect when a process dumps environment variables, possibly to steal secrets
  condition: >
    evt.type = execve and 
    proc.name in (env, printenv) and
    is_ginnungagap_sandbox
  output: "Environment variables dumped (user=%user.name command=%proc.cmdline container_id=%container.id image=%container.image.repository)"
  priority: WARNING
  tags: [isolator, info_gathering]

